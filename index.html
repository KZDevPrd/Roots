<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Roots | Local Guide</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="style.css">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyADZHmJRts2oefxj8G2Jui8I_kihovwH5U&callback=initMap" async defer></script>
</head>
<body>

    <div id="app-container">
        <section id="map-section">
            <div id="map"></div>
            <button id="recenter-btn">🎯</button>
        </section>

        <section id="story-section">
            <header class="tour-header">
                <h1>Neighborhood Roots</h1>
                <p>A curated walk through Plovdiv's local secrets.</p>
                <div class="scroll-indicator">Swipe up to start ↓</div>
            </header>

            <div id="card-container">
                </div>

            <footer class="tour-footer">
                <p>You've seen it all!</p>
                <button onclick="document.getElementById('story-section').scrollTo(0,0)" class="back-btn">Back to Start</button>
                <div class="safe-area-spacer"></div>
            </footer>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
