<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Roots | Local Guide</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="style.css">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyADZHmJRts2oefxj8G2Jui8I_kihovwH5U&callback=initMap" async defer></script>
</head>
<body>

    <div id="app-container">
        <nav class="top-nav">
            <div class="nav-content">
                <span class="app-logo">ROOTS</span>
                <div class="burger-menu" id="menu-toggle">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </nav>

        <section id="map-section">
            <div id="map"></div>
            <button id="recenter-btn">🎯</button>
        </section>

        <div class="map-spacer"></div>

        <section id="story-section">
            <header class="tour-header">
                <h1 class="accent-title">Neighborhood Roots</h1>
                <p>A curated walk through the hidden heart of the city.</p>
                <div class="scroll-indicator">Swipe up to start ↓</div>
            </header>

            <div id="card-container">
                </div>

            <footer class="tour-footer">
                <p style="margin-bottom: 20px;">You've seen it all!</p>
                <button onclick="document.getElementById('story-section').scrollTo(0,0)" class="btn-primary footer-btn">Back to Start</button>
                <div class="safe-area-spacer"></div>
            </footer>
        </section>
    </div>

    <div id="side-menu" class="side-menu">
        <div class="close-menu" id="close-menu">✕</div>
        <a href="#">About Roots</a>
        <a href="#">Other Routes</a>
        <a href="#">Contact Support</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
